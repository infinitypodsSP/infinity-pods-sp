<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Pods SP</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:#fff;
  overflow-x:hidden;
}

/* fundo animado */
body::before {
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,0,200,0.2) 0%, transparent 70%);
  animation:moveBg 12s linear infinite;
  z-index:-1;
}

@keyframes moveBg {
  0% {transform:translate(0,0);} 
  50% {transform:translate(-30%,-30%);} 
  100% {transform:translate(0,0);} 
}

header {
  padding:20px;
  text-align:center;
  font-size:30px;
  background:#111;
  letter-spacing:2px;
  text-shadow:0 0 15px #ff00cc;
}

.banner {
  text-align:center;
  padding:80px;
  background:linear-gradient(270deg,#6a00ff,#ff00cc,#6a00ff);
  background-size:400% 400%;
  animation:gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.banner h1 {
  font-size:40px;
  animation:zoomIn 1.5s ease;
}

@keyframes zoomIn {
  from {transform:scale(0.8); opacity:0;}
  to {transform:scale(1); opacity:1;}
}

.produtos {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:30px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  width:210px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 0 15px rgba(255,0,200,0.2);
  position:relative;
}

.card:hover {
  transform:translateY(-12px) scale(1.07);
  box-shadow:0 0 35px rgba(255,0,200,1);
}

.card img {
  width:100%;
  border-radius:10px;
}

.badge {
  position:absolute;
  top:10px;
  left:10px;
  background:linear-gradient(45deg,#ff0000,#ff9900);
  padding:4px 8px;
  font-size:12px;
  border-radius:6px;
  font-weight:bold;
}

.btn {
  background:#25D366;
  color:white;
  padding:8px 12px;
  text-decoration:none;
  border-radius:5px;
  display:inline-block;
  margin-top:8px;
  transition:0.3s;
}

.btn:hover {
  background:#1ebe5d;
}

/* botão whatsapp */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
  color:#fff;
  box-shadow:0 0 20px #25D366;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform:scale(1);} 
  50% {transform:scale(1.15);} 
  100% {transform:scale(1);} 
}

/* partículas */
.particle {
  position:fixed;
  width:5px;
  height:5px;
  background:#ff00cc;
  border-radius:50%;
  animation:float 6s infinite;
}

@keyframes float {
  0% {transform:translateY(100vh); opacity:0;}
  50% {opacity:1;}
  100% {transform:translateY(-10vh); opacity:0;}
}

</style>
</head>

<body>

<header>🔥 Infinity Pods SP 🔥</header>

<div class="banner">
<h1>OS MAIS BRABOS DE SP 💨</h1>
</div>

<div class="produtos">

<div class="card">
<div class="badge">🔥 MAIS VENDIDO</div>
<img src="ignite.jpg">
<h3>Ignite V400</h3>
<a class="btn" href="https://wa.me/5511948386280">Comprar</a>
</div>

<div class="card">
<div class="badge">💎 TOP</div>
<img src="elfbar.jpg">
<h3>Elf Bar</h3>
<a class="btn" href="https://wa.me/5511948386280">Comprar</a>
</div>

<div class="card">
<img src="geekbar.jpg">
<h3>Geek Bar</h3>
<a class="btn" href="https://wa.me/5511948386280">Comprar</a>
</div>

<div class="card">
<img src="nikbar.jpg">
<h3>Nikbar</h3>
<a class="btn" href="https://wa.me/5511948386280">Comprar</a>
</div>

</div>

<div class="particle" style="left:10%; animation-delay:0s;"></div>
<div class="particle" style="left:30%; animation-delay:2s;"></div>
<div class="particle" style="left:50%; animation-delay:4s;"></div>
<div class="particle" style="left:70%; animation-delay:1s;"></div>
<div class="particle" style="left:90%; animation-delay:3s;"></div>

<a class="whatsapp" href="https://wa.me/5511948386280">💬</a>

</body>
</html>
